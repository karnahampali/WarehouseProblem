<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RouteMaster Pro | Admin Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tool-btn.active-tool { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-300 min-h-screen">
    <nav class="border-b border-slate-800 bg-slate-900/80 px-8 py-4 sticky top-0 z-40">
        <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter">RouteMaster</h1>
    </nav>

    <main id="main-container" class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl shadow-xl">
                <h2 class="text-xs font-bold text-slate-500 uppercase mb-4">Database & Export</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="saveToDB()" class="bg-blue-600 py-3 rounded text-[10px] font-bold uppercase">Save Layout</button>
                    <button onclick="downloadJPG()" class="bg-emerald-600 py-3 rounded text-[10px] font-bold uppercase">Export JPG</button>
                </div>
                <div id="historyList" class="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl shadow-xl">
                <h2 class="text-xs font-bold text-slate-500 uppercase mb-4">JSON Injection</h2>
                <textarea id="jsonInput" placeholder='{"grid": [[0,0,1], [0,2,1]], "start": [0,0], "targets": [[1,1]]}' 
                    class="w-full h-32 bg-slate-900 border border-slate-700 rounded p-2 text-blue-400 font-mono text-[10px] outline-none mb-4"></textarea>
                <button onclick="importJSON()" class="w-full bg-slate-700 py-2 rounded text-[10px] font-bold uppercase mb-4">Inject Data</button>
                
                <div class="flex gap-2 mb-4">
                    <input type="number" id="gridSizeInput" value="10" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-blue-400 text-xs">
                    <button onclick="updateGridSize()" class="bg-blue-600 px-4 py-2 rounded text-[10px] font-bold">SET</button>
                </div>
                <button onclick="randomizeObstacles()" class="w-full bg-slate-700 py-3 rounded text-[10px] font-bold mb-6 uppercase">Randomize Barriers</button>
                
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <button onclick="setTool('start')" id="tool-start" class="tool-btn active-tool bg-slate-700 p-2 rounded text-[10px] font-bold uppercase">Start</button>
                    <button onclick="setTool('obstacle')" id="tool-obstacle" class="tool-btn bg-slate-700 p-2 rounded text-[10px] font-bold uppercase">Barrier</button>
                    <button onclick="setTool('target')" id="tool-target" class="tool-btn bg-slate-700 p-2 rounded text-[10px] font-bold text-yellow-500 uppercase">Target</button>
                    <button onclick="resetGrid()" class="bg-slate-700 p-2 rounded text-[10px] font-bold uppercase">Reset</button>
                </div>
                <button onclick="runSolver()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase shadow-lg shadow-blue-900/20">Execute Route</button>
            </div>
            <div id="stats" class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl hidden">
                <pre id="json-output" class="text-[10px] font-mono text-cyan-400 bg-black/50 p-4 rounded-lg overflow-x-auto"></pre>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col items-center">
            <div id="capture-zone" class="bg-slate-900/50 border border-slate-800 rounded-3xl p-10 shadow-2xl overflow-hidden">
                <div id="x-labels" class="ml-10 mb-2 grid gap-1"></div>
                <div class="flex">
                    <div id="y-labels" class="flex flex-col gap-1 mr-4 w-6"></div>
                    <div id="grid" class="grid gap-1"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentTool = 'start', size = 10, warehouse = {grid: [], start: [0, 0], targets: []};
        const createEmptyGrid = (n) => Array(n).fill().map(() => Array(n).fill(0));

        async function init() {
            warehouse.grid = createEmptyGrid(size);
            renderGrid();
            loadHistory();
        }

        function importJSON() {
            try {
                const data = JSON.parse(document.getElementById('jsonInput').value);
                warehouse = { grid: data.grid, start: data.start, targets: data.targets };
                size = data.grid.length;
                document.getElementById('gridSizeInput').value = size;
                renderGrid();
            } catch (e) { alert("Invalid Protocol"); }
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid'), xEl = document.getElementById('x-labels'), yEl = document.getElementById('y-labels');
            const style = `repeat(${size}, 2.5rem)`;
            gridEl.style.gridTemplateColumns = style; xEl.style.gridTemplateColumns = style;
            gridEl.innerHTML = ''; xEl.innerHTML = ''; yEl.innerHTML = '';
            for (let i = 0; i < size; i++) {
                xEl.innerHTML += `<div class="w-10 text-center text-[10px] font-mono font-bold text-slate-600">${i}</div>`;
                yEl.innerHTML += `<div class="h-10 flex items-center justify-end text-[10px] font-mono font-bold text-slate-600">${i}</div>`;
            }
            warehouse.grid.forEach((row, r) => {
                row.forEach((cell, c) => {
                    const d = document.createElement('div');
                    d.className = "w-10 h-10 rounded border border-slate-800 cursor-pointer flex items-center justify-center transition-all";
                    d.onclick = () => {
                        if (currentTool === 'start') warehouse.start = [r, c];
                        else if (currentTool === 'obstacle') warehouse.grid[r][c] = warehouse.grid[r][c] === 1 ? 0 : 1;
                        else if (currentTool === 'target') {
                           const idx = warehouse.targets.findIndex(t => t[0] === r && t[1] === c);
                           if (idx > -1) warehouse.targets.splice(idx, 1);
                           else warehouse.targets.push([r, c]);
                        }
                        renderGrid();
                    };
                    if (warehouse.start[0] === r && warehouse.start[1] === c) d.classList.add('bg-blue-600');
                    else if (cell === 1) d.classList.add('bg-slate-700');
                    else if (warehouse.targets.some(t => t[0] === r && t[1] === c)) d.classList.add('bg-yellow-500');
                    else d.classList.add('bg-slate-800/30');
                    gridEl.appendChild(d);
                });
            });
        }

        async function runSolver() {
            const res = await fetch('/api/solve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(warehouse) });
            const data = await res.json();
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('json-output').innerText = JSON.stringify(data, null, 2);
            if (data.path) data.path.forEach(([r, c], i) => {
                setTimeout(() => {
                    const el = Array.from(document.getElementById('grid').children)[r * size + c];
                    if (el && !el.classList.contains('bg-blue-600')) el.style.backgroundColor = "rgba(59, 130, 246, 0.4)";
                }, i * 50);
            });
        }

        async function saveToDB() {
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(warehouse) });
            loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = data.length ? '' : '<p class="text-[9px] text-slate-600 italic">No history...</p>';
            data.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left text-[9px] bg-slate-900 border border-slate-700 p-2 rounded truncate mb-1";
                btn.innerText = `ID: ${item.id} | ${item.created_at}`;
                btn.onclick = () => {
                    warehouse = { grid: JSON.parse(item.grid_data), start: JSON.parse(item.start_pos), targets: JSON.parse(item.target_pos) };
                    size = warehouse.grid.length; renderGrid();
                };
                list.appendChild(btn);
            });
        }

        function downloadJPG() {
            html2canvas(document.getElementById('capture-zone'), { backgroundColor: "#0b1120" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `route_${Date.now()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg");
                link.click();
            });
        }

        function randomizeObstacles() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if ((warehouse.start[0] === r && warehouse.start[1] === c) || warehouse.targets.some(t => t[0] === r && t[1] === c)) continue;
                    warehouse.grid[r][c] = Math.random() < 0.2 ? 1 : 0;
                }
            }
            renderGrid();
        }

        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-tool'));
            document.getElementById(`tool-${t}`).classList.add('active-tool');
        }

        function updateGridSize() {
            size = parseInt(document.getElementById('gridSizeInput').value);
            warehouse = {grid: createEmptyGrid(size), start: [0, 0], targets: []};
            renderGrid();
        }

        function resetGrid() { warehouse = {grid: createEmptyGrid(size), start: [0, 0], targets: []}; renderGrid(); }
        init();
    </script>
</body>
</html>
