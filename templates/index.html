<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RouteMaster Pro | Final Submission Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-300 min-h-screen selection:bg-blue-500/30">
    <div id="authGate" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <p class="text-blue-500 font-mono animate-pulse uppercase tracking-widest">Protocol Active...</p>
    </div>

    <nav class="border-b border-slate-800 bg-slate-900/80 px-8 py-4 flex justify-between items-center sticky top-0 z-40 backdrop-blur-md">
        <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter">RouteMaster</h1>
        <button onclick="handleLogout()" class="px-4 py-2 border border-red-500/50 text-red-500 rounded text-xs font-bold uppercase hover:bg-red-500 hover:text-white transition">Logout</button>
    </nav>

    <main id="main-container" class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 bg-[#0b1120]">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl shadow-xl">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Database & Export</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="saveToDB()" class="bg-blue-600 py-3 rounded text-[10px] font-bold uppercase hover:bg-blue-500 transition">Save Layout</button>
                    <button onclick="downloadJPG()" class="bg-emerald-600 py-3 rounded text-[10px] font-bold uppercase hover:bg-emerald-500 transition">Export JPG</button>
                </div>
                <div id="historyList" class="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar text-white">
                    <p class="text-[9px] text-slate-600 italic">No history found...</p>
                </div>
            </div>

            <div class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl shadow-xl">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">AI Vision Import</h2>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-[10px] text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-[10px] file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-500 mb-4 bg-slate-900 rounded border border-slate-700 cursor-pointer">
                <button onclick="uploadAndAnalyze()" id="analyzeBtn" class="w-full bg-purple-600 py-3 rounded text-[10px] font-bold uppercase hover:bg-purple-500 transition">Analyze Image</button>
            </div>

            <div class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl shadow-xl">
                <div class="flex gap-2 mb-4">
                    <input type="number" id="gridSizeInput" value="10" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-blue-400 font-mono text-xs outline-none focus:border-blue-500 transition-colors">
                    <button onclick="updateGridSize()" class="bg-blue-600 px-4 py-2 rounded text-[10px] font-bold">SET</button>
                </div>
                <button onclick="randomizeObstacles()" class="w-full bg-slate-700 py-3 rounded text-[10px] font-bold hover:bg-slate-600 mb-6 uppercase">Randomize Barriers</button>
                
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Editor Tools</h2>
                <div class="grid grid-cols-2 gap-2 mb-6 text-[10px] font-bold">
                    <button onclick="setTool('start')" id="tool-start" class="tool-btn border border-blue-500 bg-blue-500/10 p-2 rounded uppercase">Start (0)</button>
                    <button onclick="setTool('obstacle')" id="tool-obstacle" class="tool-btn border border-transparent bg-slate-700 p-2 rounded uppercase">Barrier (1)</button>
                    <button onclick="setTool('target')" id="tool-target" class="tool-btn border border-transparent bg-slate-700 p-2 rounded text-yellow-500 uppercase">Target (2)</button>
                    <button onclick="resetGrid()" class="bg-slate-700 p-2 rounded uppercase hover:text-red-400 transition-colors">Reset</button>
                </div>
                <button onclick="runSolver()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition-all">Execute Route</button>
            </div>

            <div id="stats" class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl hidden">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">JSON Output</h2>
                <pre id="json-output" class="text-[10px] font-mono text-cyan-400 bg-black/50 p-4 rounded-lg overflow-x-auto custom-scrollbar leading-relaxed"></pre>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col items-center">
            <div id="capture-zone" class="bg-slate-900/50 border border-slate-800 rounded-3xl p-10 shadow-2xl overflow-hidden">
                <div id="x-labels" class="ml-10 mb-2 grid gap-1"></div>
                <div class="flex">
                    <div id="y-labels" class="flex flex-col gap-1 mr-4 w-6"></div>
                    <div id="grid" class="grid gap-1 bg-no-repeat bg-center"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentTool='start', size=10, supabaseClient, warehouse={grid:[], start:[0,0], targets:[]};
        function createEmptyGrid(n) { return Array(n).fill().map(() => Array(n).fill(0)); }

        async function init() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                supabaseClient = supabase.createClient(config.url, config.key);
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) window.location.href="/login";
                else {
                    document.getElementById('authGate').remove();
                    warehouse.grid = createEmptyGrid(size);
                    renderGrid();
                    loadHistory();
                }
            } catch (e) { document.getElementById('authGate')?.remove(); }
        }

        async function saveToDB() {
            await fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(warehouse) 
            });
            loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = data.length ? '' : '<p class="text-[9px] text-slate-600 italic">No history found...</p>';
            data.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left text-[9px] bg-slate-900 border border-slate-700 p-2 rounded hover:border-blue-500 truncate mb-1 transition-all";
                btn.innerText = `ID: ${item.id} | ${item.created_at}`;
                btn.onclick = () => {
                    warehouse = { 
                        grid: JSON.parse(item.grid_data), 
                        start: JSON.parse(item.start_pos), 
                        targets: JSON.parse(item.target_pos) 
                    };
                    size = warehouse.grid.length;
                    document.getElementById('gridSizeInput').value = size;
                    document.getElementById('grid').style.backgroundImage = 'none';
                    renderGrid();
                };
                list.appendChild(btn);
            });
        }

        async function uploadAndAnalyze() {
            const fileInput = document.getElementById('imageUpload');
            const btn = document.getElementById('analyzeBtn');
            const file = fileInput.files[0];
            if (!file) return;

            btn.innerText = "Analyzing Map...";
            btn.disabled = true;
            btn.classList.add('animate-pulse', 'opacity-70');

            const imageUrl = URL.createObjectURL(file);
            const gridContainer = document.getElementById('grid');
            gridContainer.style.backgroundImage = `url(${imageUrl})`;
            gridContainer.style.backgroundSize = '100% 100%';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('/api/analyze-image', {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) throw new Error("Processing failed");
                
                const data = await res.json();
                
                size = data.size;
                document.getElementById('gridSizeInput').value = size;
                warehouse.grid = data.grid;
                warehouse.start = data.start;
                warehouse.targets = data.targets;
                renderGrid();
            } catch (e) {
                alert("AI Analysis encountered an error. Please try again.");
                gridContainer.style.backgroundImage = 'none';
            } finally {
                btn.innerText = "Analyze Image";
                btn.disabled = false;
                btn.classList.remove('animate-pulse', 'opacity-70');
            }
        }

        function downloadJPG() {
            const element = document.getElementById('main-container');
            html2canvas(element, { 
                backgroundColor: "#0b1120", 
                scale: 2,
                useCORS: true,
                onclone: (clonedDoc) => {
                    const stats = clonedDoc.getElementById('stats');
                    if (stats) stats.classList.remove('hidden');
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `routemaster_datasheet_${Date.now()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            });
        }

        function renderGrid() {
            const gridEl=document.getElementById('grid'), xEl=document.getElementById('x-labels'), yEl=document.getElementById('y-labels');
            const style = `repeat(${size}, 2.5rem)`;
            gridEl.style.gridTemplateColumns = style; xEl.style.gridTemplateColumns = style;
            gridEl.innerHTML=''; xEl.innerHTML=''; yEl.innerHTML='';
            for(let i=0; i<size; i++) {
                xEl.innerHTML += `<div class="w-10 text-center text-[10px] font-mono font-bold text-slate-600">${i}</div>`;
                yEl.innerHTML += `<div class="h-10 flex items-center justify-end text-[10px] font-mono font-bold text-slate-600">${i}</div>`;
            }
            warehouse.grid.forEach((row, r) => {
                row.forEach((cell, c) => {
                    const d = document.createElement('div');
                    d.id = `cell-${r}-${c}`;
                    d.className = "w-10 h-10 rounded border border-slate-800/50 cursor-pointer flex items-center justify-center transition-all hover:bg-slate-500/30";
                    d.onclick = () => {
                        if (currentTool==='start') warehouse.start=[r,c];
                        else if (currentTool==='obstacle') warehouse.grid[r][c]=warehouse.grid[r][c]===1?0:1;
                        else if (currentTool==='target') {
                            const targetIdx = warehouse.targets.findIndex(t => t[0]===r && t[1]===c);
                            if (targetIdx > -1) warehouse.targets.splice(targetIdx, 1);
                            else warehouse.targets.push([r,c]);
                        }
                        renderGrid();
                    };
                    if (warehouse.start[0]===r && warehouse.start[1]===c) d.classList.add('bg-blue-600/80', 'shadow-[0_0_10px_rgba(37,99,235,0.4)]');
                    else if (cell===1) d.classList.add('bg-red-600/40', 'border-red-500/30');
                    else if (warehouse.targets.some(t => t[0]===r && t[1]===c)) d.classList.add('bg-yellow-500/80', 'shadow-[0_0_10px_rgba(234,179,8,0.4)]');
                    else d.classList.add('bg-transparent');
                    gridEl.appendChild(d);
                });
            });
        }

        async function runSolver() {
            const res = await fetch('/api/solve', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(warehouse) 
            });
            const data = await res.json();
            const outputEl = document.getElementById('json-output');
            document.getElementById('stats').classList.remove('hidden');

            if (data.status === "impossible") {
                outputEl.innerHTML = `<span class="text-red-500 font-black tracking-widest uppercase text-xs">Target Unreachable</span>`;
                return;
            }

            document.querySelectorAll('.path-trail').forEach(el => {
                el.style.backgroundColor = ""; 
                el.classList.remove('path-trail', 'ring-1', 'ring-blue-400', 'bg-blue-500/40');
            });

            const compactPath = JSON.stringify(data.path).replace(/],/g, '],\n    ');
            outputEl.innerText = `{
  "timestamp": "${new Date().toLocaleString()}",
  "total_steps": ${data.total_steps},
  "packages_collected": ${data.targets_collected},
  "path": ${compactPath}
}`;
            
            data.path.forEach(([r,c], i) => {
                setTimeout(() => {
                    const el = document.getElementById(`cell-${r}-${c}`);
                    if (el && !el.classList.contains('bg-blue-600/80')) {
                        el.classList.remove('bg-transparent');
                        el.classList.add('path-trail', 'ring-1', 'ring-blue-400', 'bg-blue-500/40');
                    }
                }, i * 100);
            });
        }

        function randomizeObstacles() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if ((warehouse.start[0] === r && warehouse.start[1] === c) || warehouse.targets.some(t => t[0] === r && t[1] === c)) continue;
                    warehouse.grid[r][c] = Math.random() < 0.2 ? 1 : 0;
                }
            }
            renderGrid();
        }

        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.replace('border-blue-500', 'border-transparent'));
            document.getElementById(`tool-${t}`).classList.replace('border-transparent', 'border-blue-500');
        }

        function updateGridSize() {
            size = parseInt(document.getElementById('gridSizeInput').value);
            warehouse = { grid: createEmptyGrid(size), start:[0,0], targets:[] };
            document.getElementById('grid').style.backgroundImage = 'none';
            renderGrid();
        }

        async function handleLogout() { try { await supabaseClient.auth.signOut(); } finally { window.location.href="/login"; } }
        function resetGrid() { 
            warehouse={grid:createEmptyGrid(size), start:[0,0], targets:[]}; 
            document.querySelectorAll('.path-trail').forEach(el => {
                el.style.backgroundColor = ""; 
                el.classList.remove('path-trail', 'ring-1', 'ring-blue-400', 'bg-blue-500/40');
            });
            document.getElementById('grid').style.backgroundImage = 'none';
            renderGrid(); 
        }
        init();
    </script>
</body>
</html>
